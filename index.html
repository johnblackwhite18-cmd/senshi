function getTodaysMissions(){return ALL_MISSIONS.filter(function(m){
if(m.schedule==="all_week")return true;if(m.schedule==="weekdays")return IS_WEEKDAY;
if(m.schedule==="gym")return IS_GYM_DAY;if(m.schedule==="saturday")return DAY_NAME==="Saturday";
if(m.schedule==="sun_or_mon")return DAY_NAME==="Sunday"||DAY_NAME==="Monday";
if(m.schedule==="weekly_wed")return DAY_NAME==="Wednesday";if(m.schedule==="weekly_sat")return DAY_NAME==="Saturday";return false;});}

function sMult(s){return s>=30?3:s>=14?2:s>=7?1.5:s>=3?1.25:1;}
function getRank(rp){for(var i=RANKS.length-1;i>=0;i--){if(rp>=RANKS[i].rp[0]){var r=RANKS[i],range=r.rp[1]-r.rp[0]+1,inT=rp-r.rp[0],ds=range/r.div.length,di=Math.min(Math.floor(inT/ds),r.div.length-1);return Object.assign({},r,{division:r.div[di],progress:(inT%ds)/ds});}}return Object.assign({},RANKS[0],{division:"IV",progress:0});}

function isMC(mId,sc){var m=ALL_MISSIONS.find(function(x){return x.id===mId;});if(!m)return false;return(sc[mId]||[]).length>=Math.ceil(m.subs.length*0.5);}
function mXp(m,sc,st){var done=(sc[m.id]||[]).length,total=m.subs.length;if(done<Math.ceil(total*0.5))return 0;var streak=st[m.id]||0,mult=sMult(streak),pct=done/total,base=Math.round(m.baseXp*pct),bonus=done===total?Math.round(m.baseXp*0.25):0;return Math.round((base+bonus)*mult);}

function checkGate(sc,ms,st){if(IS_WEEKEND)return true;
var oMs=ms.filter(function(m){return m.coreType==="outreach";}),oD=oMs.filter(function(m){return isMC(m.id,sc);}).length;
var hMs=ms.filter(function(m){return m.coreType==="health";}),hD=hMs.filter(function(m){return isMC(m.id,sc);}).length;
var sMs=ms.filter(function(m){return m.coreType==="spiritual";}),sD=sMs.filter(function(m){return isMC(m.id,sc);}).length;
return oD>=Math.min(1,oMs.length)&&hD>=Math.min(2,hMs.length)&&sD>=Math.min(1,sMs.length);}

function toggleSub(missionId,subId){
var current=S.subComp[missionId]||[];
var m=ALL_MISSIONS.find(function(x){return x.id===missionId;});if(!m)return;
var newSubs;
if(current.indexOf(subId)>=0){newSubs=current.filter(function(s){return s!==subId;});}
else{newSubs=[].concat(current,[subId]);}
var newSubComp=Object.assign({},S.subComp);newSubComp[missionId]=newSubs;
var wasDone=isMC(missionId,S.subComp);

var newStreaks=Object.assign({},S.streaks);
if(!wasDone&&nowDone){newStreaks[missionId]=(S.streaks[missionId]||0)+1;}
else if(wasDone&&!nowDone){newStreaks[missionId]=Math.max(0,(S.streaks[missionId]||0)-1);}
var oldXp=mXp(m,S.subComp,S.streaks);
var newXp=mXp(m,newSubComp,newStreaks);
var xpD=newXp-oldXp,rpD=Math.round(xpD*0.25),crD=Math.round(Math.abs(xpD)*0.06)*(xpD>=0?1:-1);

if(attrs){Object.keys(attrs).forEach(function(k){var v=attrs[k];
if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
